services:

  frontend:
    image: node:22
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"

  backend:
    build: ./backend
    volumes:
      - ./backend/public:/var/www/html
      - ./backend:/app
    ports:
      - "8000:80"
    environment:
      JWT_SECRET: sistema_repartos_jwt_secret_dev
      DB_HOST: mysql
      DB_NAME: sistema_repartos
      DB_USER: root
      DB_PASS: root
      CORS_ORIGIN: http://localhost:5173
      APP_ENV: development
      APP_DEBUG: "true"
    command: sh -c "cd /app && composer install --no-interaction && apache2-foreground"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistema_repartos
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
